<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habit Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            padding: 40px 20px;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #1a1a2e;
            font-size: 2rem;
        }

        .main {
            max-width: 600px;
            margin: 0 auto;
        }

        /* Add Section */
        .add-div {
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
        }

        #write-habit {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        #write-habit:focus {
            border-color: #6c63ff;
        }

        #add {
            padding: 12px 20px;
            background: #6c63ff;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        #add:hover {
            background: #574fd6;
        }

        /*  Habit Card  */
        .habit-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            padding: 16px 20px;
            border-radius: 12px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.07);
        }

        .habit-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .habit-info input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #6c63ff;
        }

        .habit-name {
            font-size: 1rem;
            color: #1a1a2e;
            font-weight: 500;
        }

        .habit-meta {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .streak {
            font-size: 0.85rem;
            color: #ff6b35;
            font-weight: 600;
        }

        .delete-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.1rem;
            opacity: 0.6;
            transition: opacity 0.2s;
        }

        .delete-btn:hover {
            opacity: 1;
        }
    </style>
    <script src="script.js" defer></script>
</head>

<body>
    <h1>Habit Tracker</h1>
    <div class="main">
        <div class="add-div">
            <input type="text" id="write-habit">
            <button id="add">Add</button>
        </div>

        <div class="display-div">
        
        </div> 
    </div>
</body>

</html>
