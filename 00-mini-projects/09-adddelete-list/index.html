<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Delete List</title>
    <script src="script.js" defer></script>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            font-family: sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }
        #main{
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        #add{
            padding: 10px;
            background: cadetblue;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            width: 100px;
            align-self: center;
        }
        .item{
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 14px;
            background: #f9f9f9;
            border: 1px solid #eee;
            border-radius: 8px;
        }
        .item span {
            font-size: 15px;
            color: #333;
        }
         .delete {
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 6px 12px;
            cursor: pointer;
            font-size: 13px;
        }
    </style>
</head>

<body>
    <div id="main">
        <label for="input">list your items</label>
        <input type="text" id="input" placeholder="item">
        <button id="add">Add Item</button>
        <div class="display">
            <div id="list"></div>
        </div>
    </div>

</body>

</html>
