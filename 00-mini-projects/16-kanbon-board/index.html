<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban Board</title>
    <script src="script.js" defer></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: sans-serif;
            background: #f0f0f0;
            padding: 30px 20px;
        }

        h1 {
            text-align: center;
            margin-bottom: 24px;
            color: #222;
        }

        .board {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .column {
            background: white;
            padding: 20px;
            border-radius: 12px;
            width: 280px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            min-height: 400px;
        }

        .column h3 {
            font-size: 16px;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .tasks {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1;
        }

        .task {
            background: #f9f9f9;
            border: 1px solid #eee;
            border-radius: 8px;
            padding: 10px 12px;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .task button {
            background: cadetblue;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 4px 8px;
            font-size: 12px;
            cursor: pointer;
        }

        input {
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
        }

        .column>button {
            padding: 8px;
            background: #222;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }
    </style>
</head>

<body>
    <div class="board">
        <div class="column" id="todo">
            <h3>To Do</h3>
            <div class="tasks"></div>
            <input id="task-input" type="text" placeholder="Add task...">
            <button id="add">Add</button>
        </div>
        <div class="column" id="inprogress">
            <h3>In Progress</h3>
            <div class="tasks"></div>

        </div>
        <div class="column" id="done">
            <h3>Done</h3>
            <div class="tasks"></div>
        </div>
    </div>
</body>

</html>
