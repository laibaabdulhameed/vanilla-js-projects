<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countdown Timer</title>
    <script src="script.js" defer></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: sans-serif;
            background: #f5f5f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            gap: 16px;
        }

        input {
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ddd;
            border-radius: 8px;
            outline: none;
            width: 200px;
            text-align: center;
        }

        button {
            padding: 10px 24px;
            background: cadetblue;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }

        #count-down {
            font-size: 18px;
            color: #333;
        }

        #count-down span {
            font-weight: bold;
            font-size: 24px;
            color: cadetblue;
        }

        #model {
            background: white;
            display: none;
            padding: 20px 40px;
            border-radius: 12px;
            border: 1px solid #ddd;
            font-size: 20px;
            font-weight: bold;
            color: #e74c3c;
        }

        #model.show {
            display: block;
        }
    </style>
</head>

<body>
    <input type="number" placeholder="enter the number.." id="time">
    <button id="btn">Start the timer</button>
    <p id="count-down">time remaining: <span id="display">10 seconds</span></p>

    <!-- model -->
    <div id="model">
        <p id="model-description">Times Up!</p>
    </div>

</body>

</html>
