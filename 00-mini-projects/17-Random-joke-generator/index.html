<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joke Generator</title>
    <script src="script.js" defer></script>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
           font-family: sans-serif;
            background: #f0f0f0;
            padding: 30px 20px;
        }
        h1{
            text-align: center;
            margin-bottom: 24px;
            color: #222;
        }
        .main{
             background: white;
             padding: 20px;
             border-radius: 12px;
             width: 350px;
             min-height: 100px;
             margin: 0 auto;
             display: flex;
             flex-direction: column;

             
        }
        .new-joke{
            background: cadetblue;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 4px 8px;
            font-size: 12px;
            width: 100px;
            cursor: pointer;
            margin-top: 130px;
            margin-left: 100px;

        }

    </style>
</head>
<body>
    <h1>Jokes</h1>
    <div class="main">
        <div class="joke"></div>
         <button class="new-joke">New</button>
    </div>
    
</body>
</html>
