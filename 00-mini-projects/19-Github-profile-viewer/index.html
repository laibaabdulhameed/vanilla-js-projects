<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Profile Viewer</title>
    <script src="script.js" defer></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }

        .main {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        h1 {
            text-align: center;
            color: #222;
        }

        .search-bar {
            display: flex;
            gap: 10px;
        }

        .search-bar input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
        }

        .search-bar button {
            padding: 10px 20px;
            background: #333;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
        }

        .profile {
            background: white;
            border-radius: 12px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            border: 1px solid #eee;
            display: none;
        }

        #avater {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
        }

        .name {
            font-size: 20px;
            font-weight: bold;
            color: #222;
        }

        .Username {
            font-size: 14px;
            color: #888;
        }

        .bio {
            font-size: 14px;
            color: #555;
            text-align: center;
        }

        .followers,
        .following,
        .repos,
        .location {
            font-size: 14px;
            color: #444;
        }

        .stats {
            display: flex;
            gap: 20px;
            justify-content: center;
        }
    </style>
</head>

<body>
    <div class="main">
        <h1>GitHub Profile Viewer</h1>
        <div class="search-bar">
            <input type="text" placeholder="enter name"  id="nameOfPerson">
            <button id="search">Find</button>
        </div>
        <div class="profile">
            <img src="" alt="" id="avater">
            <div class="name"></div>
            <div class="Username"></div>
            <div class="bio"></div>
            <div class="stats">
                <div class="followers"></div>
                <div class="following"></div>
                <div class="repos"></div>
            </div>
            <div class="location"></div>
        </div>
    </div>

</body>

</html>
