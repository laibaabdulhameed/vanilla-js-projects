<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart</title>
    <script src="sscript.js" defer></script>
    <style>
        * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: sans-serif;
    background: #f5f5f5;
    padding: 30px 20px;
}

h2 {
    margin-bottom: 16px;
    color: #222;
}

.products {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 16px;
    margin-bottom: 40px;
}

.product {
    background: white;
    padding: 20px;
    border-radius: 12px;
    border: 1px solid #eee;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

h3 {
    font-size: 16px;
    color: black;
}

.product .price {
    font-size: 18px;
    font-weight: bold;
    color: cadetblue;
}

.product button {
    padding: 8px;
    background: cadetblue;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
}

.cart {
    background: white;
    padding: 24px;
    border-radius: 12px;
    border: 1px solid #eee;
    max-width: 500px;
}

.cart-item {
    display: flex;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid #f0f0f0;
    font-size: 15px;
}

.total {
    margin-top: 16px;
    font-size: 20px;
    font-weight: bold;
    color: #222;
}
    </style>
</head>
<body>
    <div class="products">
    </div>
    <!-- cart -->
     <div class="cart">
        <h2>Cart</h2>
        <div class="cart-items"></div>
        <div class="total">$0</div>
     </div>
</body>
</html>
