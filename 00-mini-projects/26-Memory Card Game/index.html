<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Card Game</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            font-family: sans-serif;
            background-color: #f5f5f5;

        }
        .main{
            background-color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            margin: 150px 80px;
            padding: 100px;
            gap: 20px;
        }
        h1{
            color: rgb(44, 40, 40);
        }
        .cards{
            display: flex;
            flex-direction: row;
            gap: 10px;
        }
        .card{
            height: 100px;
            width: 100px;
            background-color: black;
            border-radius: 5px;
        }
        .card.flipped{
            height: 100px;
            width: 100px;
            background-color: black;
            border-radius: 5px;
        }
        .card.flipped span{
            display: inline-block;
            margin: 32px;
            
        }
        span{
            display: none;
        }

        @media (max-width:1030px) {
            .cards{
                flex-direction: column;
            }
        }

    </style>
    <script src="script.js" defer> </script>
</head>
<body>
    <div class="main">
        <h1>Mind Game</h1>
         <div class="cards">
         </div>
    </div>
  
</body>
</html>
