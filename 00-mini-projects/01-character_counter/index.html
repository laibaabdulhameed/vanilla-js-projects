<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Counter</title>
    <script src="script.js" defer></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        textarea {
            min-height: 80px;
            width: 300px;
            display: block;
            margin: 0 auto;
            margin-top: 100px;
        }
        small{
             margin-left: 630px;
        }
        .warning{
            color:red;
        }
        .safe{
            color:black;
        }
        
    </style>
</head>

<body>
    <div class="charcater_counter">
        <textarea maxlength="150" id="character-input" placeholder="start writing your thoughts...."></textarea>
        <small id="characters"> <span id="Length">150</span> characters remaning</small>
    </div>

</body>

</html>
