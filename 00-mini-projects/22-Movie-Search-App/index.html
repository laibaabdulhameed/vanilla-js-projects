<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Search App</title>
    <script src="script.js" defer></script>
    <style>
        * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: sans-serif;
    background: #f5f5f5;
    padding: 40px 20px;
}

.main {
    max-width: 900px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 24px;
}

h1 {
    text-align: center;
    color: #222;
}

.search-bar {
    display: flex;
    gap: 10px;
    justify-content: center;
}

.search-bar input {
    padding: 10px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 15px;
    outline: none;
    width: 300px;
}

.search-bar button {
    padding: 10px 20px;
    background: #333;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 15px;
}
.movie-div {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 16px;
}

.movie-card {
    background: white;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid #eee;
    cursor: pointer;
    transition: transform 0.2s;
}

.movie-card:hover {
    transform: scale(1.03);
}

.movie-card img {
    width: 100%;
    height: 280px;
    object-fit: cover;
}

.movie-card .movie-info {
    padding: 10px;
}

.movie-card h3 {
    font-size: 14px;
    color: #222;
}

.movie-card p {
    font-size: 13px;
    color: #888;
    margin-top: 4px;
}
 
    </style>
</head>
<body>
    <div class="main">
        <h1>Search Your Favourite Movies</h1>
        <div class="search-bar">
            <input type="text"  id="search">
            <button id="Get">Click</button>
        </div>
        <div class="movie-div"></div>
    </div>
    
</body>
</html>
