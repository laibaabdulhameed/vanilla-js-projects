<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>quiz app </title>
    <script src="script.js" defer></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .quiz {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .question {
            font-size: 20px;
            font-weight: bold;
            color: #222;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .option {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            background: white;
            text-align: left;
        }

        .option.correct {
            background: #2ecc71;
            color: white;
            border-color: #2ecc71;
        }

        .option.wrong {
            background: #e74c3c;
            color: white;
            border-color: #e74c3c;
        }

        .score {
            font-size: 20px;
            font-weight: bold;
            color: #0b0b0b;
            width: 50px;
            height: 30px;
            background-color: cadetblue;
            border-radius: 10px;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="quiz">
        <div class="question"></div>
        <div class="options"></div>
        <span class="score"> </span>
    </div>

</body>

</html>
