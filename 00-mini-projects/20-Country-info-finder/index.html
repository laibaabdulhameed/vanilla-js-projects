<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Country Info Finder</title>
    <script src="script.js" defer></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }

        .main {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        h1 {
            text-align: center;
            color: #222;
        }

        .search-bar {
            display: flex;
            gap: 10px;
        }

        .search-bar input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
        }

        .search-bar button {
            padding: 10px 20px;
            background: #333;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
        }

        .info {
            background: white;
            border-radius: 12px;
            padding: 24px;
            border: 1px solid #eee;
            display: none;
            flex-direction: column;
            gap: 12px;
        }

        #flag {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 8px;
        }

        .name {
            font-size: 22px;
            font-weight: bold;
            color: #222;
        }

        .capital,
        .population,
        .region,
        .languages,
        .currency {
            font-size: 15px;
            color: #444;
            padding: 8px 0;
            border-bottom: 1px solid #f0f0f0;
        }
    </style>
</head>

<body>
    <div class="main">
        <h1>Country Info Finder</h1>
        <div class="search-bar">
            <input type="text" placeholder="enter name" id="nameOfCountry">
            <button id="search">Find</button>
        </div>
        <div class="info">
            <img src="" alt="" id="flag">
            <div class="name"></div>
            <div class="capital"></div>
            <div class="population"></div>
            <div class="region"></div>
            <div class="languages"></div>
            <div class="currency"></div>
        </div>


    </div>

</body>

</html>
