<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe Ingredeint Scaler</title>
    <script src="script.js" defer></script>
    <style>
        * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: sans-serif;
    background: #f5f5f5;
    display: flex;
    justify-content: center;
    padding: 40px 20px;
}

.main {
    background: white;
    padding: 30px;
    border-radius: 12px;
    width: 100%;
    max-width: 500px;
    display: flex;
    flex-direction: column;
    gap: 16px;
}

.recepie div, .updated-recepie div {
    display: flex;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid #f0f0f0;
    font-size: 15px;
    color: #333;
}

input {
    padding: 10px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 15px;
    outline: none;
    width: 100%;
}

button {
    padding: 10px;
    background: cadetblue;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    cursor: pointer;
}

h3 {
    color: #222;
    font-size: 18px;
}
    </style>
</head>
<body>
    <div class="main">
        <div class="recepie"></div>
        <input type="number" id="people" placeholder="enter the number of peoples...">
        <button id="add">Calculate</button>
        <div class="updated-recepie"></div>
    </div>
    
</body>
</html>
