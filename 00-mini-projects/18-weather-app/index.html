<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <script src="script.js"  defer></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: sans-serif;
            background: #f0f0f0;
            padding: 30px 20px;
        }

        h2 {
            text-align: center;
            margin-bottom: 24px;
            color: #222;
        }

        .main {
            background: white;
            padding: 20px;
            border-radius: 12px;
            width: 350px;
            min-height: 400px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
        }
        .search{
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .get{
            background-color: cadetblue;
            width: 60px;
            border-radius: 10px;
            cursor: pointer;
        }
        .weather-display{
            display: flex;
            align-items: end;
            justify-content: center;
            gap: 10px;
            flex-direction: column;
            font-size: 24px;
            margin-right: 85px;
            margin-top: 15px;
            text-align: left;
        }
    </style>
</head>

<body>
    <div class="main">
        <h2>Find Weather</h2>
        <div class="search">
            <input type="text" id="searching-bar">
            <button class="get">GET</button>
        </div>
        <div class="weather-display">
            <div class="area"></div>
            <div class="temp"></div>
            <div class="condition"></div>
            <div class="humidity"></div>
            <div class="speed"></div>
        </div>
    </div>

</body>

</html>
