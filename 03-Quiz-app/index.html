<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz App</title>
    <link rel="stylesheet" href="style.css">
    <script type="module" src="script.js"></script>
</head>

<body>
    <div class="popup">
        <div class="popup__box">
            <h1 class="popup__heading">Psycology Quix</h1>
            <p class="popup__text">Think you know how the human mind works? Test your knowledge with the 10 carefully
                crafted questions covering core psycology cocepts, theories, and thinkers.</p>
            <button class="popup__btn">Get Start!</button>
        </div>
    </div>
    <h1 class="quiz__heading">Quiz App</h1>
    <div class="quiz__card">
        <div class="quiz__progress">
            <div class="quiz__progress-fill"></div>
        </div>
        <p class="quiz__questionNumber">Question 1 of 10</p>
        <h2 class="quiz__question">What is psycology?</h2>
        <div class="quiz__options">
            <button class="quiz__btn ">Option A</button>
            <button class="quiz__btn ">Option B</button>
            <button class="quiz__btn ">Option C</button>
            <button class="quiz__btn ">Option D</button>
        </div>
        <div class="quiz__result">
            <span class="quiz__emogi">🎉</span>
            <h2 class="quiz__score">Your Score</h2>
            <button class="quiz__restart">Restart</button>
        </div>
    </div>


</body>

</html>
